<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FindMyForce — Common Operating Picture</title>
    <meta name="description" content="Real-time RF emitter classification and geolocation dashboard" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
      :root { --display: 'Share Tech Mono', monospace; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; width: 100%; overflow: hidden; }
      body {
        background: #020810;
        font-family: 'Share Tech Mono', monospace;
      }
      /* Loading screen */
      .loading-screen {
        position: fixed; inset: 0;
        background: radial-gradient(ellipse at center, #020f1a 0%, #010508 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
      }
      .loading-ring {
        width: 48px; height: 48px;
        border: 3px solid rgba(0,245,212,0.2);
        border-top-color: #00f5d4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 20px rgba(0,245,212,0.3);
      }
      .loading-text {
        margin-top: 16px;
        font-size: 11px;
        color: #00f5d4;
        letter-spacing: 3px;
        text-transform: uppercase;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-ring"></div>
        <div class="loading-text">Initializing System...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
